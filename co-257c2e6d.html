<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社アイシーエル様｜Canal AI研修 特別ご提案</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0a1628;
      color: #e8e8e8;
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      line-height: 1.8;
      font-size: 16px;
    }
    a {
      color: #c9a227;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    /* ========== HEADER BAR ========== */
    .header-bar {
      background: linear-gradient(90deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      border-bottom: 2px solid #c9a227;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-size: 13px;
      color: #c9a227;
      letter-spacing: 2px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .header-tag {
      background: #c9a227;
      color: #0a1628;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ========== HERO ========== */
    .hero {
      position: relative;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 80px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a1628 0%, #0f2040 40%, #1a3460 70%, #0a1628 100%);
      z-index: 0;
    }
    .hero-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,162,39,0.12) 0%, transparent 70%);
      z-index: 1;
    }
    .hero-photo-row {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .hero-photo-wrap {
      width: 200px;
      height: 130px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(201,162,39,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .hero-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }
    .hero-eyebrow {
      display: inline-block;
      background: rgba(201,162,39,0.15);
      border: 1px solid rgba(201,162,39,0.6);
      color: #c9a227;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 3px;
      padding: 6px 20px;
      border-radius: 30px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .hero-title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 12px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    .hero-title span {
      color: #c9a227;
    }
    .hero-subtitle {
      font-size: clamp(14px, 2.5vw, 18px);
      color: rgba(255,255,255,0.75);
      max-width: 640px;
      margin: 0 auto 32px;
      line-height: 1.9;
    }
    .hero-cta-btn {
      display: inline-block;
      background: linear-gradient(135deg, #c9a227 0%, #e8c547 50%, #c9a227 100%);
      color: #0a1628;
      font-size: 16px;
      font-weight: 900;
      padding: 18px 48px;
      border-radius: 50px;
      letter-spacing: 1px;
      box-shadow: 0 6px 30px rgba(201,162,39,0.5);
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .hero-cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(201,162,39,0.7);
      text-decoration: none;
    }
    .hero-cta-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 12px;
    }

    /* ========== SECTION COMMON ========== */
    .section {
      padding: 80px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .section-label {
      text-align: center;
      margin-bottom: 48px;
    }
    .section-label .eyebrow {
      display: inline-block;
      color: #c9a227;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .section-label h2 {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.4;
    }
    .section-label h2 span {
      color: #c9a227;
    }
    .section-label p {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      margin-top: 12px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(201,162,39,0.2);
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ========== SCENARIO CARDS ========== */
    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .scenario-card {
      background: linear-gradient(145deg, #0f2040 0%, #162850 100%);
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 16px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .scenario-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,162,39,0.6);
    }
    .scenario-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9a227, #e8c547);
    }
    .scenario-num {
      font-size: 11px;
      font-weight: bold;
      color: #c9a227;
      letter-spacing: 3px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .scenario-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }
    .scenario-card h3 {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .scenario-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
    }
    .scenario-result {
      margin-top: 16px;
      background: rgba(201,162,39,0.1);
      border-left: 3px solid #c9a227;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #c9a227;
      font-weight: bold;
    }

    /* ========== FEATURES ========== */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .feature-card {
      background: #0f2040;
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .feature-card:hover {
      transform: translateY(-4px);
    }
    .feature-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(201,162,39,0.2), rgba(201,162,39,0.05));
      border: 2px solid rgba(201,162,39,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
    }
    .feature-card h3 {
      font-size: 17px;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .feature-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.68);
      line-height: 1.9;
    }
    .feature-badge {
      display: inline-block;
      margin-top: 14px;
      background: rgba(201,162,39,0.15);
      border: 1px solid rgba(201,162,39,0.4);
      color: #c9a227;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ========== TRACK RECORD ========== */
    .track-section {
      background: linear-gradient(135deg, #0f1e38 0%, #162040 100%);
      border-top: 1px solid rgba(201,162,39,0.15);
      border-bottom: 1px solid rgba(201,162,39,0.15);
      padding: 80px 24px;
    }
    .track-inner {
      max-width: 1000px;
      margin: 0 auto;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }
    .stat-box {
      text-align: center;
      padding: 32px 20px;
      background: rgba(201,162,39,0.06);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 16px;
      position: relative;
    }
    .stat-num {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 900;
      color: #c9a227;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-unit {
      font-size: 18px;
      color: #c9a227;
    }
    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 8px;
      line-height: 1.6;
    }
    .industry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 36px;
    }
    .industry-tag {
      background: rgba(201,162,39,0.1);
      border: 1px solid rgba(201,162,39,0.3);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* ========== SUBSIDY ========== */
    .subsidy
