<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社アイシーエル様｜Canal AI 研修 特別ご提案</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0a1628;
      color: #e8e8e8;
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
      line-height: 1.8;
      font-size: 16px;
    }
    a {
      color: #c9a227;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    /* ===== HEADER ===== */
    .site-header {
      background: rgba(10, 22, 40, 0.95);
      border-bottom: 1px solid rgba(201, 162, 39, 0.3);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header .brand {
      font-size: 13px;
      color: #c9a227;
      letter-spacing: 0.12em;
      font-weight: 700;
    }
    .site-header .header-cta {
      background: #c9a227;
      color: #0a1628;
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .site-header .header-cta:hover {
      background: #e0b830;
      text-decoration: none;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 80px 24px 60px;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a1628 0%, #0d2044 40%, #0a1628 100%);
      z-index: 0;
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 30%, rgba(201,162,39,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 20% 80%, rgba(13,32,68,0.6) 0%, transparent 70%);
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 900px;
      width: 100%;
      text-align: center;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.4);
      color: #c9a227;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    .hero-to {
      font-size: clamp(14px, 2vw, 16px);
      color: #a0b4cc;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .hero-title {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .hero-title .company {
      color: #c9a227;
      display: block;
    }
    .hero-title .sub {
      color: #ffffff;
      display: block;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 400;
      margin-top: 10px;
      letter-spacing: 0.03em;
    }
    .hero-catch {
      font-size: clamp(16px, 2.5vw, 22px);
      color: #c9a227;
      font-weight: 700;
      margin: 28px 0 16px;
      letter-spacing: 0.05em;
    }
    .hero-desc {
      font-size: clamp(14px, 1.8vw, 17px);
      color: #b0c4d8;
      max-width: 640px;
      margin: 0 auto 40px;
      line-height: 2;
    }
    .hero-photos {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .hero-photos img {
      width: 260px;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid rgba(201,162,39,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .hero-cta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, #c9a227, #e0b830);
      color: #0a1628;
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 900;
      padding: 18px 48px;
      border-radius: 6px;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 24px rgba(201,162,39,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,162,39,0.5);
      text-decoration: none;
    }
    .hero-note {
      font-size: 12px;
      color: #6a7f96;
      letter-spacing: 0.05em;
    }
    .scroll-hint {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #4a6080;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid rgba(201,162,39,0.4);
      border-bottom: 2px solid rgba(201,162,39,0.4);
      transform: rotate(45deg);
      animation: bounce 1.6s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }

    /* ===== SECTION BASE ===== */
    .section {
      padding: 80px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #c9a227;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }
    .section-title {
      font-size: clamp(22px, 3.5vw, 36px);
      font-weight: 900;
      text-align: center;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .section-title span {
      color: #c9a227;
    }
    .section-desc {
      text-align: center;
      color: #8aa0b8;
      font-size: 15px;
      margin-bottom: 52px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #c9a227, transparent);
      margin: 16px auto 48px;
      border-radius: 2px;
    }

    /* ===== SCENARIO SECTION ===== */
    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .scenario-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 12px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .scenario-card:hover {
      border-color: rgba(201,162,39,0.5);
      transform: translateY(-4px);
    }
    .scenario-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9a227, transparent);
    }
    .scenario-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #c9a227;
      margin-bottom: 16px;
    }
    .scenario-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }
    .scenario-card h3 {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .scenario-card p {
      font-size: 14px;
      color: #8aa0b8;
      line-height: 1.9;
    }
    .scenario-before-after {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .tag-before {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff8080;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 700;
    }
    .tag-arrow {
      color: #c9a227;
      font-size: 14px;
      font-weight: 700;
    }
    .tag-after {
      background: rgba(201,162,39,0.1);
      border: 1px solid rgba(201,162,39,0.3);
      color: #c9a227;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 700;
    }

    /* ===== FEATURES SECTION ===== */
    .features-bg {
      background: rgba(255,255,255,0.015);
      border-top: 1px solid rgba(201,162,39,0.1);
      border-bottom: 1px solid rgba(201,162,39,0.1);
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }
    .feature-card {
      text-align: center;
      padding: 40px 28px;
      border-radius: 12px;
      background: rgba(201,162,39,0.04);
      border: 1px solid rgba(201,162,39,0.15);
    }
    .feature-icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
    }
    .feature-card h3 {
      font-size: 17px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
